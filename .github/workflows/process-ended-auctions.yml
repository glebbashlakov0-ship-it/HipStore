name: Process Ended Auctions

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: process-ended-auctions
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger ended auction processor
        run: |
          set -euo pipefail
          response="$(curl --silent --show-error --fail \
            --request POST \
            --header 'Content-Type: application/json' \
            https://njsnxxiybniocteqbndp.supabase.co/functions/v1/process-ended-auctions)"
          echo "$response"
